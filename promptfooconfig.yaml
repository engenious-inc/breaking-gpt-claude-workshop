description: "Breaking GPT & Claude — workshop eval (MediBot triage assistant)"

prompts:
  # For Assistants, the "prompt" is just the user's turn — the assistant carries
  # its own system instructions on the OpenAI side.
  - "{{query}}"

providers:
  # Primary target: the MediBot assistant created by scripts/create-assistant.js.
  # ASSISTANT_ID is written to .env automatically by setup.sh / setup.ps1.
  - id: openai:assistant:${ASSISTANT_ID}

  # OPTIONAL — multi-model comparison. Uncomment and add OPENROUTER_API_KEY
  # to .env to attack the same prompts against open-source models.
  # - id: openrouter:meta-llama/llama-3.1-8b-instruct
  # - id: openrouter:mistralai/mistral-7b-instruct
  # - id: openrouter:google/gemma-2-9b-it

  # OPTIONAL — direct GPT vs Claude comparison. Requires ANTHROPIC_API_KEY.
  # - id: openai:gpt-4o-mini
  # - id: anthropic:messages:claude-haiku-4-5

tests:
  - file://tests/jailbreaks.yaml
  - file://tests/hallucinations.yaml
  - file://tests/cost-context.yaml
